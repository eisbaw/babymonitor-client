[workspace]
resolver = "2"
members = ["babymonitor-core", "babymonitor-cli"]

# Shared dependency versions live here so the two crates stay in lockstep.
# Kept intentionally minimal; real deps (reqwest, tokio, aes, ...) are added by
# the tasks that need them (see TASK-0007/0012/0013).
[workspace.dependencies]
thiserror = "2"
clap = { version = "4", features = ["derive"] }
# Signing + token store (TASK-0012). MD5 is the recovered keyed-hash primitive
# (re/tuya_sign_static.md Â§3 â€” plain MD5, NOT HMAC-SHA256); sha2 is for the
# offline app-cert hash; base64/hex for the canonical-string encodings; dirs for
# the XDG data dir; serde/serde_json/chrono for the session token store.
md5 = "0.7"
sha2 = "0.10"
base64 = "0.22"
hex = "0.4"
dirs = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
aes-gcm = "0.10"
# 302-payload localKey-AES primitive (TASK-0037). The recovered cipher is
# AES-128/ECB/PKCS5(=PKCS7), NO IV, key=localKey ASCII bytes â€” see
# decompiled/.../AESUtil.java getInstance(this.ALGO="AES") + init(mode,key) with
# no IvParameterSpec. We use the vetted RustCrypto `aes` block cipher and drive
# raw ECB blocks via its `cipher::BlockEncrypt`/`BlockDecrypt` traits, adding
# PKCS7 padding ourselves (small, auditable, KAT-checked against openssl). The
# standalone `ecb` crate is NOT used: it is absent from the offline registry
# index, so pulling it would break `just assert-offline`; `aes`+`cipher` are
# already in the local cargo cache, keeping the offline gate green.
aes = "0.8"
# Media-plane (PATH A) crypto (TASK-0037). All are already in the local cargo
# cache, so adding them keeps `just assert-offline` green:
#   - `cbc`  (cbc-0.1.2)  â†’ AES-128-CBC per-KCP-segment decrypt (suite 3, inline 16B IV).
#   - `hmac` (hmac-0.12.1)â†’ datagram HMAC integrity tag (suite 3, key=16B SDP aes-key).
#   - `sha1` (sha1-0.10)  â†’ the datagram HMAC digest. cap4 pins the trailer at
#     20 bytes = HMAC-SHA1 (NOT the 32B SHA-256 the spec first assumed): the
#     receiver builds the MAC via `mbedtls_md_info_from_type(5)` and in mbedtls
#     3.x enum 5 = SHA-1, and `HMAC-SHA1(key, datagram[:-20])` reproduces the
#     real trailing 20 bytes on the captured stream.
# `aes-gcm` (already pinned by the cli crate) covers suite 4 (AES-128-GCM, [G]).
cbc = "0.1"
hmac = "0.12"
sha1 = "0.10"
# 1.9 raises MSRV to Rust 1.85; this workspace promises Rust 1.74.
zeroize = "=1.8.2"
# Inflate the (DEFLATE-compressed) APK signature block for the offline cert
# hash. Pure-Rust miniz_oxide backend (no system zlib) keeps the e2e gate
# self-contained and offline.
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
# MQTT signaling transport for the Tuya WebRTC-over-MQTT 302 channel (TASK-0034).
# We use rumqttc's SYNCHRONOUS `Client`/`Connection` (no async runtime spun by
# us) behind the `stream::session::MqttTransport` seam. default-features OFF on
# purpose: it drops the TLS stack (rustls/ring) â€” a large, network/C-build-heavy
# tree that would jeopardise the `just assert-offline` gate. The live Tuya broker
# IS TLS, so the `use-rustls` feature must be re-enabled on the live path; that is
# a live-only follow-up (TASK-0035), gated like the rest of the live stream.
# webrtc-rs is deliberately NOT added â€” see babymonitor-core/src/stream/mod.rs.
rumqttc = { version = "0.24", default-features = false }

[workspace.package]
edition = "2021"
license = "MIT"
rust-version = "1.74"
